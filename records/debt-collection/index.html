<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Debt Collection</title>

  <meta name="description"
        content="Debt collection reference records by jurisdiction." />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background: #fafafa;
      color: #111;
      font-family: Georgia, "Times New Roman", serif;
    }

    .container {
      max-width: 820px;
      margin: 85px auto;
      padding: 0 36px;
    }

    h1 {
      font-size: 30px;
      font-weight: normal;
      margin-bottom: 14px;
      letter-spacing: -0.2px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #e6e6e6;
      margin-bottom: 20px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .item {
      font-size: 16.5px;
      line-height: 1.45;
    }

    .group-start {
      margin-top: 10px;
    }

    a {
      text-decoration: none;
      color: inherit;
      border-bottom: 1px solid #ccc;
    }

    a:hover {
      border-bottom: 1px solid #111;
    }

    .footer {
      margin-top: 105px;
      font-size: 12.5px;
      color: #666;
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      .container {
        padding: 0 22px;
        margin: 65px auto;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>Debt Collection</h1>

    <div class="divider"></div>

    <div class="list">

      <!-- Nordics -->
      <div class="item"><a href="/records/debt-collection/sweden/">Sweden</a></div>
      <div class="item"><a href="/records/debt-collection/denmark/">Denmark</a></div>
      <div class="item"><a href="/records/debt-collection/norway/">Norway</a></div>
      <div class="item"><a href="/records/debt-collection/finland/">Finland</a></div>

      <!-- Western Europe -->
      <div class="item group-start"><a href="/records/debt-collection/germany/">Germany</a></div>
      <div class="item"><a href="/records/debt-collection/netherlands/">Netherlands</a></div>
      <div class="item"><a href="/records/debt-collection/belgium/">Belgium</a></div>
      <div class="item"><a href="/records/debt-collection/france/">France</a></div>

      <!-- Southern Europe -->
      <div class="item group-start"><a href="/records/debt-collection/spain/">Spain</a></div>
      <div class="item"><a href="/records/debt-collection/italy/">Italy</a></div>

      <!-- Central Europe -->
      <div class="item group-start"><a href="/records/debt-collection/poland/">Poland</a></div>
      <div class="item"><a href="/records/debt-collection/austria/">Austria</a></div>
      <div class="item"><a href="/records/debt-collection/switzerland/">Switzerland</a></div>

      <!-- UK / IE -->
      <div class="item group-start"><a href="/records/debt-collection/united-kingdom/">United Kingdom</a></div>
      <div class="item"><a href="/records/debt-collection/ireland/">Ireland</a></div>

    </div>

    <div class="footer">
      Domain: Debt Collection<br />
      Structure: Jurisdictional Index<br />
      Status: Active
    </div>

  </div>
</body>
</html>
