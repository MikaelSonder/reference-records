<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reference Records</title>

  <meta name="description"
        content="Reference records organized by domain." />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background: #fafafa;
      color: #111;
      font-family: Georgia, "Times New Roman", serif;
    }

    .container {
      max-width: 820px;
      margin: 95px auto;
      padding: 0 36px;
    }

    h1 {
      font-size: 34px;
      font-weight: normal;
      margin-bottom: 26px;
      letter-spacing: -0.2px;
    }

    .label-top {
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #777;
      margin-bottom: 14px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #e6e6e6;
      margin-bottom: 18px;
    }

    .list {
      display: flex;
      flex-direction: column;
    }

    .group {
      margin-top: 26px;
    }

    .group:first-child {
      margin-top: 0;
    }

    .group-label {
      font-size: 11px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 8px;
    }

    .item {
      font-size: 16px;
      line-height: 1.4;
      margin: 4px 0;
    }

    a {
      text-decoration: none;
      color: inherit;
      border-bottom: 1px solid #ddd;
    }

    a:hover {
      border-bottom: 1px solid #111;
    }

    .footer {
      margin-top: 110px;
      font-size: 12.5px;
      color: #666;
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      .container {
        padding: 0 22px;
        margin: 70px auto;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>Reference Records</h1>

    <div class="label-top">Structured by Domain.</div>

    <div class="divider"></div>

    <div class="list">

      <!-- Expansion -->
      <div class="group">
        <div class="group-label">Expansion</div>

        <div class="item"><a href="/records/company-formation/">Company Formation</a></div>
        <div class="item"><a href="/records/tax-advisory/">Tax Advisory</a></div>
        <div class="item"><a href="/records/accounting/">Accounting</a></div>
        <div class="item"><a href="/records/payroll-employment/">Payroll &amp; Employment</a></div>
        <div class="item"><a href="/records/vat-advisory/">VAT Advisory</a></div>
      </div>

      <!-- Problems -->
      <div class="group">
        <div class="group-label">Problems</div>

        <div class="item"><a href="/records/debt-collection/">Debt Collection</a></div>
        <div class="item"><a href="/records/litigation/">Litigation</a></div>
      </div>

      <!-- Legal Core -->
      <div class="group">
        <div class="group-label">Legal Core</div>

        <div class="item"><a href="/records/corporate-law/">Corporate Law</a></div>
        <div class="item"><a href="/records/employment-law/">Employment Law</a></div>
      </div>

    </div>

    <div class="footer">
      Classification: Domain Structure<br />
      Scope: Cross-Border Systems<br />
      Status: Active
    </div>

  </div>
</body>
</html>
